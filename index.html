<style>
  :root {
    --bg:#0f0f0f; --card:#1a1a1a; --border:#2a2a2a; --text:#ccc;
    --text-dim:#777; --accent:#f5c518; --green:#2ecc71; --red:#e74c3c;
    --blue:#3498db; --douban:#4a9c3f; --imdb:#f3ce13;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .header{
    position:sticky;top:0;z-index:100;
    background:rgba(15,15,15,0.95);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);padding:16px 24px;
  }
  .header h1{font-size:1.5rem;color:#fff;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .header h1 span{font-size:0.85rem;color:var(--text-dim);font-weight:400}

  .stats{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 14px;display:flex;align-items:center;gap:6px;font-size:0.85rem}
  .stat .num{font-size:1.2rem;font-weight:700;color:#fff}
  .num.green{color:var(--green)} .num.gray{color:var(--text-dim)} .num.gold{color:var(--accent)}

  .progress-wrap{margin-top:10px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
  .toolbar input[type=text]{flex:1;min-width:180px;max-width:360px;background:var(--card);border:1px solid var(--border);color:#fff;padding:8px 12px;border-radius:6px;font-size:0.85rem;outline:none;transition:border-color .2s}
  .toolbar input[type=text]:focus{border-color:var(--accent)}

  .btn-group{display:flex;gap:0;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
  .btn-group button{background:var(--card);color:var(--text);border:none;padding:8px 14px;font-size:0.82rem;cursor:pointer;transition:all .2s}
  .btn-group button+button{border-left:1px solid var(--border)}
  .btn-group button:hover{background:#2a2a2a}
  .btn-group button.active{background:var(--accent);color:#000;font-weight:600}

  .btn-accent{background:var(--accent);color:#000;border:none;padding:8px 14px;border-radius:6px;font-size:0.82rem;cursor:pointer;font-weight:600;transition:opacity .2s}
  .btn-accent:hover{opacity:.85}
  .btn-blue{background:var(--blue);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:0.82rem;cursor:pointer;transition:opacity .2s}
  .btn-blue:hover{opacity:.85}

  .movie-list{padding:20px 24px;columns:3;column-gap:18px}
  @media(max-width:1300px){.movie-list{columns:2}}
  @media(max-width:800px){.movie-list{columns:1}}

  .movie-card{
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    padding:13px 15px;margin-bottom:10px;break-inside:avoid;
    transition:border-color .2s,transform .15s;position:relative;
    display:flex;align-items:flex-start;gap:10px;
  }
  .movie-card:hover{border-color:#444;transform:translateY(-1px)}
  .movie-card.watched{border-color:#1f3a1f;background:#0e180e}
  .movie-card.watched .watch-badge{
    position:absolute;top:10px;right:12px;
    color:var(--green);font-weight:700;font-size:0.8rem;
    background:#0a1f0a;padding:2px 8px;border-radius:10px;
  }
  .movie-num{color:var(--text-dim);font-size:0.72rem;min-width:22px;text-align:center;padding-top:1px;flex-shrink:0}
  .movie-body{flex:1;min-width:0}
  .movie-title{font-size:0.92rem;color:#fff;font-weight:500;margin-bottom:4px;line-height:1.3}
  .movie-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .movie-director{font-size:0.73rem;color:var(--text-dim)}
  .movie-year{font-size:0.72rem;color:#888;background:#1a1a1a;padding:1px 6px;border-radius:3px}
  .rating-badge{font-size:0.7rem;padding:1px 7px;border-radius:3px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
  .rating-badge.imdb{background:#1a1a0a;color:var(--imdb)}
  .rating-badge.douban{background:#0a1a0a;color:var(--douban)}

  .movie-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .movie-controls label{display:flex;align-items:center;gap:4px;font-size:0.75rem;color:var(--text-dim);cursor:pointer;user-select:none}
  .movie-controls input[type=checkbox]{accent-color:var(--green);width:14px;height:14px;cursor:pointer}
  .user-rating{background:var(--bg);color:#fff;border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:0.75rem;cursor:pointer;outline:none}
  .user-rating:focus{border-color:var(--accent)}
  .comment-input{width:100%;margin-top:7px;background:var(--bg);color:#ccc;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:0.75rem;outline:none;transition:border-color .2s;display:none}
  .movie-card.watched .comment-input{display:block}
  .comment-input:focus{border-color:var(--accent)}
  .comment-input::placeholder{color:#555}

  .empty-msg{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:1rem}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.75);
    z-index:200;display:flex;align-items:center;justify-content:center;
    animation:fadeIn .2s;
  }
  @keyframes fadeIn{from{opacity:0}}
  .modal{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:28px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;
  }
  .modal h2{font-size:1.2rem;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .modal label{display:block;font-size:0.82rem;color:var(--text-dim);margin-bottom:4px;margin-top:14px}
  .modal label:first-of-type{margin-top:0}
  .modal input{width:100%;background:var(--bg);color:#fff;border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:0.9rem;outline:none}
  .modal input:focus{border-color:var(--accent)}
  .modal .row{display:flex;gap:12px}
  .modal .row>div{flex:1}
  .modal .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .modal .btn-cancel{background:#333;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:0.85rem}
  .modal .btn-save{background:var(--accent);color:#000;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.85rem}

  .rec-section{padding:0 24px;margin-top:0}
  .rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:16px 0}
  .rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s,transform .15s;cursor:default}
  .rec-card:hover{border-color:#555;transform:translateY(-2px)}
  .rec-card .rec-title{font-size:1rem;color:#fff;font-weight:600;margin-bottom:6px}
  .rec-card .rec-meta{font-size:0.78rem;color:var(--text-dim);margin-bottom:4px}
  .rec-card .rec-reason{font-size:0.75rem;color:var(--accent);margin-top:8px;font-style:italic}
  .rec-card .rec-badges{display:flex;gap:8px;margin-top:6px}

  .rec-header{display:flex;align-items:center;gap:16px;padding:16px 0 0}
  .rec-header h3{color:#fff;font-size:1.1rem}
  .rec-header .btn-sm{font-size:0.75rem;padding:5px 12px}

  .footer{text-align:center;padding:30px 20px;color:var(--text-dim);font-size:0.78rem;border-top:1px solid var(--border);margin-top:20px}
</style>
</head>

<div class="header">

    <button class="btn-blue" style="background:#555" onclick="exportData()">📥 导出</button>
  </div>
</div>

<div id="rec-container"></div>
<div class="movie-list" id="movie-list"></div>
<div class="footer">数据自动保存在浏览器本地 · 关闭页面不会丢失 · 评分数据截至 2026 年</div>

<!-- Add Movie Modal -->
<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeAddModal()">

    </div>
    <div class="row">

      <div><label>年份</label><input type="text" id="add-year" placeholder="如 2024"></div>
    </div>
    <div class="row">

      <div><label>IMDb 评分</label><input type="text" id="add-imdb" placeholder="如 7.8"></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-save" onclick="addMovie()">保存</button>
    </div>
  </div>
</div>

const STORAGE_KEY = 'movie-checklist-v2';

function defaultUserData() {
  return ORDERED_TITLES.map(title => ({title, watched:false, rating:0, comment:''}));
}

function loadData() {
  const oldRaw = localStorage.getItem('movie-checklist-data');
  if (oldRaw && !localStorage.getItem(STORAGE_KEY)) {
    try {
      const old = JSON.parse(oldRaw);
      const migrated = old.map(m => ({title:m.title, watched:!!m.watched, rating:m.rating||0, comment:m.comment||''}));
      saveData(migrated);
      localStorage.removeItem('movie-checklist-data');
    } catch(e) {}
  }
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return defaultUserData();
  try {
    const saved = JSON.parse(raw);
    const map = new Map(saved.map(m => [m.title, m]));
    const merged = ORDERED_TITLES.map(title => map.get(title) || {title, watched:false, rating:0, comment:''});
    saved.forEach(m => { if (!ORDERED_TITLES.includes(m.title)) merged.push(m); });
    return merged;
  } catch(e) { return defaultUserData(); }
}

function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

let movies = loadData();
let currentFilter = 'all';
let searchTerm = '';
let currentRecs = [];

function getMeta(movie) {
  if (MOVIE_DB[movie.title]) return MOVIE_DB[movie.title];
  if (movie.custom) return { d: movie.director||'?', y: movie.year||0, im: movie.imdb||0, db: movie.douban||0 };
  return null;
}

function render() {
  const listEl = document.getElementById('movie-list');
  const filtered = movies.filter(m => {
    if (currentFilter==='watched') return m.watched;
    if (currentFilter==='unwatched') return !m.watched;
    return true;
  }).filter(m => {
    if (!searchTerm) return true;
    const meta = getMeta(m);
    const dir = meta ? meta.d : '';
    return m.title.includes(searchTerm) || dir.includes(searchTerm) || (m.comment&&m.comment.includes(searchTerm));
  });

  if (filtered.length===0) {
    listEl.innerHTML = '<div class="empty-msg">🎞️ 没有匹配的电影</div>';
  } else {
    listEl.innerHTML = filtered.map(m => {
      const idx = movies.indexOf(m);
      const num = idx >= 0 ? idx+1 : '★';
      const wClass = m.watched?' watched':'';
      const meta = getMeta(m);
      const dir = meta ? meta.d : (m.director||'');
      const yr = meta ? meta.y : (m.year||'');
      const im = meta ? meta.im : (m.imdb||0);
      const db = meta ? meta.db : (m.douban||0);
      const ratingOpts = Array.from({length:11},(_,v)=>`<option value="${v}" ${m.rating===v?'selected':''}>${v===0?'评分':v}</option>`).join('');
      return `
        <div class="movie-card${wClass}" data-index="${idx}">
          <div class="movie-num">#${num}</div>
          <div class="movie-body">
            <div class="movie-title">${esc(m.title)}</div>
            <div class="movie-meta">
              ${dir?`<span class="movie-director">🎬 ${esc(dir)}</span>`:''}
              ${yr?`<span class="movie-year">${yr}</span>`:''}
              ${im?`<span class="rating-badge imdb">IMDb ★${im.toFixed(1)}</span>`:''}
              ${db?`<span class="rating-badge douban">豆瓣 ★${db.toFixed(1)}</span>`:''}
            </div>
            <div class="movie-controls">
              <label><input type="checkbox" ${m.watched?'checked':''} onchange="toggleWatched(${idx})">已看</label>
              <select class="user-rating" onchange="setRating(${idx},this.value)" ${m.watched?'':'disabled'}>
                ${ratingOpts}
              </select>
            </div>
            <input class="comment-input" type="text" placeholder="💬 写句短评..." value="${esc(m.comment||'')}" oninput="setComment(${idx},this.value)">
            ${m.watched?'<div class="watch-badge">✓</div>':''}
          </div>
        </div>`;
    }).join('');
  }
  updateStats();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function updateStats() {
  const total = movies.length;
  const watched = movies.filter(m=>m.watched).length;
  const rated = movies.filter(m=>m.watched&&m.rating>0);
  const avg = rated.length>0 ? (rated.reduce((s,m)=>s+m.rating,0)/rated.length).toFixed(1) : '-';
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-watched').textContent = watched;
  document.getElementById('stat-unwatched').textContent = total-watched;
  document.getElementById('stat-avg').textContent = avg;
  document.getElementById('progress-bar').style.width = total>0?Math.round(watched/total*100)+'%':'0%';
}

function toggleWatched(i) {
  movies[i].watched = !movies[i].watched;
  if (!movies[i].watched) { movies[i].rating=0; movies[i].comment=''; }
  persistAndRender();
}
function setRating(i, v) { movies[i].rating=parseInt(v); persistAndRender(); }
function setComment(i, v) { movies[i].comment=v; saveData(movies); }
function persistAndRender() { saveData(movies); render(); }

document.getElementById('search').addEventListener('input', function(e){
  searchTerm = e.target.value.trim(); render();
});
document.getElementById('filter-btns').addEventListener('click', function(e){
  if (e.target.tagName!=='BUTTON') return;
  currentFilter = e.target.dataset.filter;
  this.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  render();
});

function openAddModal() { document.getElementById('add-modal').style.display='flex'; document.getElementById('add-title').focus(); }
function closeAddModal() {
  document.getElementById('add-modal').style.display='none';
  ['add-title','add-director','add-year','add-douban','add-imdb'].forEach(id=>document.getElementById(id).value='');
}

async function searchMovie(btn) {
  const rawTitle = document.getElementById('add-title').value.trim();
  if (!rawTitle) { alert('请先输入电影名称'); return; }
  btn.textContent = '⏳ 搜索中...'; btn.disabled = true;
  const searchTitle = CN_MAP[rawTitle] || rawTitle;
  try {
    const url = `https://www.omdbapi.com/?t=${encodeURIComponent(searchTitle)}&apikey=8804f0d8`;
    console.log('搜索:', url);
    const resp = await fetch(url);
    const data = await resp.json();
    console.log('结果:', data);
    if (data.Response === 'True') {
      if (data.Director) document.getElementById('add-director').value = DIR_MAP[data.Director] || data.Director;
      if (data.Year) document.getElementById('add-year').value = data.Year;
      if (data.imdbRating && data.imdbRating !== 'N/A') document.getElementById('add-imdb').value = data.imdbRating;
    } else {
      const hint = (rawTitle !== searchTitle)
        ? '已尝试英文名 "' + searchTitle + '" 也未找到。'
        : 'OMDb 不支持中文搜索，请尝试用英文片名（如 "Love Letter" 代替 "情书"）。';
      alert('未找到 "' + rawTitle + '"\n\n' + hint + '\n\n也可手动填写下方信息后直接保存。');
    }
  } catch(e) { alert('搜索失败: ' + e.message); console.error(e); }
  btn.textContent = '🔍 搜索'; btn.disabled = false;
}

function addMovie() {
  const title = document.getElementById('add-title').value.trim();
  if (!title) { alert('请输入电影名称'); return; }
  if (movies.find(m=>m.title===title)) { alert('该电影已在清单中'); return; }
  const director = document.getElementById('add-director').value.trim();
  const year = parseInt(document.getElementById('add-year').value) || 0;
  const douban = parseFloat(document.getElementById('add-douban').value) || 0;
  const imdb = parseFloat(document.getElementById('add-imdb').value) || 0;
  movies.push({
    title, watched:false, rating:0, comment:'',
    custom: true, director, year, douban, imdb
  });
  persistAndRender();
  closeAddModal();
}

function generateRecs() {
  const watched = movies.filter(m=>m.watched);
  if (watched.length < 3) {
    currentRecs = movies.filter(m=>!m.watched).sort((a,b)=>{
      const ma=getMeta(a), mb=getMeta(b);
      return ((mb?mb.im+mb.db:0)-(ma?ma.im+ma.db:0));
    }).slice(0,10);
    renderRecs('🎲 高分推荐（看更多电影后推荐会更精准）');
    return;
  }
  const rated = watched.filter(m=>m.rating>=7);
  const favDirectors = new Map();
  const years = [];
  rated.forEach(m=>{
    const meta = getMeta(m);
    if (meta) {
      favDirectors.set(meta.d, (favDirectors.get(meta.d)||0)+1);
      if (meta.y) years.push(meta.y);
    }
  });
  const topDirectors = [...favDirectors.entries()].sort((a,b)=>b[1]-a[1]).slice(0,8).map(e=>e[0]);
  const avgYear = years.length>0 ? years.reduce((s,y)=>s+y,0)/years.length : 1990;
  const scored = movies.filter(m=>!m.watched).map(m=>{
    const meta = getMeta(m);
    let score = 0;
    const reasons = [];
    if (meta) {
      if (topDirectors.includes(meta.d)) { score+=4; reasons.push('你喜欢的导演'); }
      if (meta.y && Math.abs(meta.y-avgYear)<10) { score+=1; reasons.push('年代契合'); }
      if (meta.im>=8.0) { score+=2; }
      if (meta.db>=8.5) { score+=2; }
    }
    if (meta && meta.im>=8.3 && meta.db>=8.8) score+=1;
    return { m, score, reasons };
  });
  scored.sort((a,b)=>b.score-a.score);
  const pool = scored.slice(0, Math.min(40, scored.length));
  for (let i=pool.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  currentRecs = pool.slice(0,10).map(s=>({...s.m, recReasons:s.reasons, recScore:s.score}));
  renderRecs('🎲 今日推荐 · 基于你的观影偏好');
}

function renderRecs(title) {
  const container = document.getElementById('rec-container');
  if (currentRecs.length===0) { container.innerHTML=''; return; }
  container.innerHTML = `
    <div class="rec-section">
      <div class="rec-header">
        <h3>${title}</h3>
        <button class="btn-accent btn-sm" onclick="generateRecs()">🔄 换一批</button>
        <button class="btn-blue btn-sm" style="background:#444" onclick="dismissRecs()">✕ 收起</button>
      </div>
      <div class="rec-grid">
        ${currentRecs.map(m=>{
          const meta = getMeta(m);
          const dir = meta?meta.d:(m.director||'');
          const yr = meta?meta.y:(m.year||'');
          const im = meta?meta.im:(m.imdb||0);
          const db = meta?meta.db:(m.douban||0);
          const reasons = m.recReasons||[];
          const reasonText = reasons.length>0 ? reasons.join(' · ') : (im>=8.5?'高分经典':'值得一看');
          return `
            <div class="rec-card">
              <div class="rec-title">${esc(m.title)}</div>
              <div class="rec-meta">🎬 ${esc(dir)} · ${yr}</div>
              <div class="rec-badges">
                ${im?`<span class="rating-badge imdb">IMDb ★${im.toFixed(1)}</span>`:''}
                ${db?`<span class="rating-badge douban">豆瓣 ★${db.toFixed(1)}</span>`:''}
              </div>
              <div class="rec-reason">💡 ${reasonText}</div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
  container.scrollIntoView({behavior:'smooth'});
}

function dismissRecs() { currentRecs=[]; document.getElementById('rec-container').innerHTML=''; }

function exportData() {
  const lines = ['# 🎬 电影清单 (导出)',''];
  lines.push('| # | 电影名称 | 导演 | 年份 | IMDb | 豆瓣 | 已看 | 评分 | 评价 |');
  lines.push('|---|----------|------|------|------|------|:----:|:----:|------|');
  movies.forEach((m,i)=>{
    const meta = getMeta(m);
    const d = meta?meta.d:(m.director||'');
    const y = meta?meta.y:(m.year||'');
    const im = meta?meta.im:(m.imdb||'');
    const db = meta?meta.db:(m.douban||'');
    const idx = (i<ORDERED_TITLES.length)?(i+1):'★';
    lines.push(`| ${idx} | ${m.title} | ${d||'-'} | ${y||'-'} | ${im||'-'} | ${db||'-'} | ${m.watched?'[x]':'[ ]'} | ${m.rating||'-'}/10 | ${m.comment||''} |`);
  });
  lines.push('');
  lines.push(`- 已看：${movies.filter(m=>m.watched).length} / ${movies.length}`);
  const blob = new Blob([lines.join('\n')],{type:'text/markdown'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='movie-checklist-export.md'; a.click();
  URL.revokeObjectURL(a.href);
}
